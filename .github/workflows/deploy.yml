name: Deploy via FTP

# Deploys the site to the hosting server over FTP on every push to main.
# Can also be run manually from the Actions tab.
#
# Required repository secrets (Settings -> Secrets and variables -> Actions):
#   FTP_SERVER     hostname or IP of the FTP server (no ftp:// prefix)
#   FTP_USERNAME   FTP account username
#   FTP_PASSWORD   FTP account password

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  ftp-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: FTP deploy
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          protocol: ftp
          port: 21
          server-dir: /
          # Only upload what the site serves. Skip repo metadata and raw sources.
          exclude: |
            **/.git*
            **/.git*/**
            **/.github/**
            .gitignore
            README.md
            IMPACT - Brief.docx
            Creatives/**
